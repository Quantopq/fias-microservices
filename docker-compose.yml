services:
  # MSSQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fias-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - fias-network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQL_PASSWORD} -Q 'SELECT 1'
      interval: 10s
      timeout: 3s
      retries: 10

  # FIAS API Service
  fias-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fias-api-service
    environment:
      - DaApiKey=${DADATA_API_KEY}
      - DaBaseUrl=https://suggestions.dadata.ru/suggestions/api/4_1/rs
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    networks:
      - fias-network
    depends_on:
      - sqlserver
    restart: unless-stopped

  # Client API Service
  client-api:
    build:
      context: ./ClientApiService
      dockerfile: Dockerfile
    container_name: client-api-service
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FiasDb;User=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - FiasServiceUrl=http://fias-api:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8081:8081"
    networks:
      - fias-network
    depends_on:
      - fias-api
      - sqlserver
    restart: unless-stopped

networks:
  fias-network:
    driver: bridge

volumes:
  sqlserver-data: